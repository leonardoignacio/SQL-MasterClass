<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQL MasterClass | Portal Definitivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#0056b3', accent: '#ff7518', sys: { ddl: '#6f42c1', dml: '#28a745', dql: '#007bff', dcl: '#dc3545', dtl: '#fd7e14' } } } } }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col md:flex-row h-screen overflow-hidden relative">

    <header class="md:hidden bg-gray-900 text-white p-4 flex justify-between items-center shadow-md z-30 relative shrink-0">
        <div class="flex items-center gap-2">
            <span class="text-accent font-bold text-xl tracking-tight">MasterClass</span>
            <span class="text-xs font-light text-gray-400 uppercase mt-1">SQL</span>
        </div>
        <button onclick="toggleSidebar()" class="text-gray-300 hover:text-white focus:outline-none p-1">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </header>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black bg-opacity-60 z-40 hidden transition-opacity duration-300 md:hidden"></div>

    <aside id="sidebar" class="w-72 bg-gray-900 text-white flex flex-col border-r-4 border-accent shadow-2xl fixed inset-y-0 left-0 transform -translate-x-full transition-transform duration-300 ease-in-out z-50 md:relative md:translate-x-0 shrink-0">
        <div class="p-6 bg-gray-800 flex justify-between items-center border-b border-gray-700">
            <div>
                <h2 class="text-accent text-2xl font-bold mb-1">SQL MasterClass</h2>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">JS Render Engine</p>
            </div>
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-red-500">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <nav id="sidebar-nav" class="flex-1 overflow-y-auto custom-scroll py-4 pb-20 md:pb-4">
            </nav>
    </aside>

    <main class="flex-1 overflow-y-auto custom-scroll relative bg-white" id="main-scroll">
        <div id="app-root" class="w-full min-h-full relative pb-10">
            </div>
    </main>

    <div id="toast-container" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 md:left-auto md:transform-none md:right-5 md:bottom-5 z-50 flex flex-col gap-2 w-11/12 md:w-auto max-w-sm"></div>

    <script src="js/data_aula1.js"></script>
    <script src="js/data_aula2.js"></script>
    <script src="js/data_aula3.js"></script>
    <script src="js/data_aula4.js"></script>
    <script src="js/data_biblia.js"></script>
    
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
